<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Écran Présentateur — BTS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../firebase-config.js" onerror="console.log('Firebase non configuré.')"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family:'Plus Jakarta Sans',sans-serif; background:#020617; color:#f8fafc; margin:0; overflow:hidden; }
        @keyframes fadeIn  { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes popIn   { 0%{transform:scale(.85);opacity:0} 70%{transform:scale(1.03)} 100%{transform:scale(1);opacity:1} }
        @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.3} }
        @keyframes scoreGrow { from{width:0} to{width:var(--w)} }
        @keyframes scoreCount { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }
        @keyframes timerPulse { 0%,100%{color:#f97316} 50%{color:#f43f5e} }
        .fade-in { animation:fadeIn .5s ease forwards; }
        .pop-in  { animation:popIn .4s cubic-bezier(.34,1.56,.64,1) forwards; }
        .pulse   { animation:pulse 1.5s infinite; }
        .screen  { display:none; position:fixed; inset:0; flex-direction:column; }
        .screen.active { display:flex; }
        .score-bar-fill { animation:scoreGrow .8s cubic-bezier(.4,0,.2,1) forwards; }
        .score-val { animation:scoreCount .4s cubic-bezier(.34,1.56,.64,1) forwards; }
        .timer-urgent { animation:timerPulse .6s infinite; }
    </style>
</head>
<body>

<!-- ================ CONNEXION ================ -->
<div id="screen-connect" class="screen active p-8 text-center">
    <div class="fade-in" style="max-width:480px;width:100%">
        <div class="text-6xl mb-6">🖥️</div>
        <h1 class="text-4xl font-black text-white uppercase italic mb-2">Écran <span class="text-violet-400">Présentateur</span></h1>
        <p class="text-slate-500 text-sm font-medium mb-10">Entre le code affiché sur le téléphone du présentateur</p>
        <input id="pres-code" type="text" placeholder="00" maxlength="2" inputmode="numeric"
               class="w-28 block mx-auto bg-slate-900 border-2 border-slate-700 rounded-2xl px-4 py-4 text-white font-black text-center text-4xl tracking-[0.5em] placeholder-slate-700 outline-none focus:border-violet-500 transition-colors mb-4"
               oninput="this.value=this.value.replace(/\D/g,'').slice(0,2)" onkeydown="if(event.key==='Enter')connect()">
        <button onclick="connect()" class="w-full max-w-xs mx-auto block py-4 bg-violet-700 hover:bg-violet-600 text-white font-black uppercase rounded-2xl active:scale-95 transition-all shadow-lg">
            Connecter l'écran
        </button>
        <p id="connect-error" class="hidden mt-4 text-rose-400 text-sm font-bold"></p>
    </div>
</div>

<!-- ================ ATTENTE ================ -->
<div id="screen-wait" class="screen p-8 text-center">
    <div class="fade-in">
        <div class="text-7xl mb-6 pulse">⏳</div>
        <h2 class="text-2xl font-black text-white uppercase">En attente du présentateur...</h2>
        <p id="wait-course" class="text-slate-500 text-sm mt-2"></p>
        <div id="wait-code" class="mt-8 bg-slate-900 border border-slate-800 rounded-3xl px-8 py-4 inline-block">
            <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest mb-1">Code salle</p>
            <p class="text-5xl font-black text-white tracking-[0.3em]"></p>
        </div>
    </div>
</div>

<!-- ================ QUESTION ================ -->
<div id="screen-question" class="screen" style="flex-direction:row">

    <!-- COLONNE GAUCHE : Question principale -->
    <div class="flex-grow flex flex-col p-10 min-w-0">
        <!-- Top bar -->
        <div class="flex items-center justify-between mb-6 flex-shrink-0">
            <div id="q-round-badge" class="bg-violet-700/80 backdrop-blur text-white font-black text-sm px-4 py-2 rounded-full"></div>
            <div id="q-double-badge" class="hidden bg-orange-500 text-white font-black text-sm px-4 py-2 rounded-full animate-pulse">✦ Double points</div>
            <!-- Timer -->
            <div id="q-timer-box" class="flex items-center gap-3 bg-slate-900/80 border border-slate-800 rounded-2xl px-5 py-2.5">
                <span id="q-timer-num" class="text-3xl font-black text-violet-400 tabular-nums w-14 text-center">—</span>
            </div>
        </div>
        <!-- Timer bar -->
        <div id="q-timer-bar-wrap" class="h-1.5 bg-slate-800 rounded-full overflow-hidden mb-6 flex-shrink-0">
            <div id="q-timer-bar" class="h-full bg-violet-500 w-full" style="transition:width linear"></div>
        </div>
        <!-- Question card -->
        <div id="q-card" class="flex-grow bg-slate-900/60 border-2 border-slate-800 rounded-[2.5rem] p-10 flex flex-col justify-center text-center fade-in">
            <p class="text-[11px] font-black text-slate-600 uppercase tracking-widest mb-6" id="q-label">Terme</p>
            <h2 id="q-term" class="text-5xl font-black text-white leading-tight"></h2>
            <!-- Answer (revealed by host) -->
            <div id="q-answer-area" class="hidden mt-8 pt-8 border-t border-slate-800 fade-in">
                <p class="text-[11px] font-black text-emerald-500 uppercase tracking-widest mb-4">✓ Réponse</p>
                <p id="q-def" class="text-3xl font-bold text-emerald-400 leading-snug"></p>
            </div>
        </div>
    </div>

    <!-- COLONNE DROITE : Scores live -->
    <div id="q-scores-panel" class="flex-shrink-0 flex flex-col p-6 border-l border-slate-800/60" style="width:280px;background:rgba(15,23,42,.8)">
        <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest mb-4">🏆 Scores</p>
        <div id="q-teams-live" class="space-y-3 flex-grow"></div>
    </div>
</div>

<!-- ================ SCORES ================ -->
<div id="screen-scores" class="screen items-center justify-center p-12">
    <div class="w-full fade-in" style="max-width:800px">
        <div class="text-center mb-10">
            <p class="text-[11px] font-black text-slate-600 uppercase tracking-widest mb-2">Classement intermédiaire</p>
            <h2 class="text-5xl font-black text-white uppercase italic">🏆 Scores</h2>
        </div>
        <div id="sc-list" class="space-y-4"></div>
    </div>
</div>

<!-- ================ FIN ================ -->
<div id="screen-end" class="screen p-12 text-center">
    <div class="fade-in" style="max-width:700px">
        <div class="text-8xl mb-6">🏆</div>
        <h2 class="text-5xl font-black text-white uppercase italic mb-2">Partie terminée !</h2>
        <p class="text-slate-500 mb-10">Merci d'avoir joué</p>
        <div id="end-podium" class="space-y-4 mb-8"></div>
        <button onclick="location.reload()" class="px-8 py-4 bg-violet-700 text-white font-black uppercase rounded-2xl active:scale-95 transition-all">
            Nouvelle partie
        </button>
    </div>
</div>

<script>
// =====================================================================
// FIREBASE
// =====================================================================
let fbApp = null, fbDb = null;
let roomCode = '', unsubRoom = null;

async function loadScript(src) {
    return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src; s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
    });
}

async function initFirebase() {
    const cfg = window.FIREBASE_CONFIG;
    if (!cfg || cfg.apiKey === 'VOTRE_API_KEY') { showError('Firebase non configuré'); return false; }
    try {
        const v = '10.12.0';
        await loadScript(`https://www.gstatic.com/firebasejs/${v}/firebase-app-compat.js`);
        await loadScript(`https://www.gstatic.com/firebasejs/${v}/firebase-auth-compat.js`);
        await loadScript(`https://www.gstatic.com/firebasejs/${v}/firebase-firestore-compat.js`);
        if (!firebase.apps.length) firebase.initializeApp(cfg);
        fbDb = firebase.firestore();
        // Connexion anonyme pour accès Firestore
        const auth = firebase.auth();
        if (!auth.currentUser) {
            await auth.signInAnonymously().catch(e => console.warn('Anon auth:', e));
        }
        return true;
    } catch(e) { showError('Erreur Firebase : ' + e.message); return false; }
}

// =====================================================================
// CONNECT
// =====================================================================
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
function showError(msg) {
    const el = document.getElementById('connect-error');
    el.textContent = msg; el.classList.remove('hidden');
}

async function connect() {
    const code = document.getElementById('pres-code').value.trim();
    if (!/^\d{2}$/.test(code)) { showError('Code à 2 chiffres requis'); return; }

    const ok = await initFirebase();
    if (!ok) return;

    const snap = await fbDb.collection('rooms').doc(code).get();
    if (!snap.exists) { showError('Salle introuvable — vérifie le code'); return; }

    roomCode = code;
    // Mark screen connected
    fbDb.collection('rooms').doc(code).set({ screenConnected: true }, { merge: true });

    startListening();
}

// =====================================================================
// REAL-TIME LISTENER
// =====================================================================
function startListening() {
    if (unsubRoom) unsubRoom();
    unsubRoom = fbDb.collection('rooms').doc(roomCode).onSnapshot(snap => {
        if (!snap.exists) { showScreen('screen-connect'); return; }
        const room = snap.data();
        if (!room || room.type !== 'presenter') return;
        handleRoomState(room);
    });
}

let currentPhase = '', qTimerInterval = null;

function handleRoomState(room) {
    const phase = room.phase || 'waiting';

    if (phase === 'waiting') {
        showScreen('screen-wait');
        document.getElementById('wait-course').textContent = room.courseName || '';
        document.querySelector('#wait-code p:last-child').textContent = roomCode;
        return;
    }

    if (phase === 'question') {
        const q = (room.questions || [])[room.currentQ || 0];
        if (!q) return;

        const isNewQ = room.currentQ !== parseInt(document.getElementById('q-round-badge').dataset.q||'-1');
        if (phase !== currentPhase || isNewQ) {
            renderQuestion(room, q);
        }
        // Show/hide answer
        const ansArea = document.getElementById('q-answer-area');
        if (room.showAnswer) ansArea.classList.remove('hidden');
        else ansArea.classList.add('hidden');

        // Scores live (toujours mis à jour)
        renderTeamsBar(room.settings?.teams || []);
    }

    if (phase === 'scores') {
        renderScores(room.settings?.teams || []);
        showScreen('screen-scores');
    }

    if (phase === 'end') {
        renderEnd(room.settings?.teams || []);
        showScreen('screen-end');
    }

    currentPhase = phase;
}

function renderQuestion(room, q) {
    document.getElementById('q-term').textContent = q.term || '';
    document.getElementById('q-def').textContent  = q.def  || '';
    document.getElementById('q-answer-area').classList.add('hidden');

    const roundBadge = document.getElementById('q-round-badge');
    const qNum = (room.currentQ || 0) + 1;
    roundBadge.textContent = `Q ${qNum} / ${(room.questions||[]).length}`;
    roundBadge.dataset.q = room.currentQ;

    const doubleBadge = document.getElementById('q-double-badge');
    if (q.isDouble) doubleBadge.classList.remove('hidden');
    else doubleBadge.classList.add('hidden');

    // Timer
    clearInterval(qTimerInterval);
    const noTimer = room.settings?.noTimer || !room.questionStartTime;
    const timeLimit = room.settings?.timePerQ || room.settings?.timeQ || 20;
    const timerBox = document.getElementById('q-timer-box');
    const timerBarWrap = document.getElementById('q-timer-bar-wrap');
    const timerBar = document.getElementById('q-timer-bar');
    const numEl = document.getElementById('q-timer-num');

    if (noTimer || timeLimit === 0) {
        numEl.textContent = '∞';
        numEl.style.color = '#475569';
        if (timerBarWrap) timerBarWrap.style.opacity = '0';
        if (timerBar) { timerBar.style.transition='none'; timerBar.style.width='100%'; timerBar.style.background='#1e293b'; }
    } else {
        if (timerBarWrap) timerBarWrap.style.opacity = '1';
        const startTime = room.questionStartTime || Date.now();
        // Animate bar
        const elapsed = Math.max(0, (Date.now() - startTime) / 1000);
        const pctLeft = Math.max(0, (timeLimit - elapsed) / timeLimit * 100);
        if (timerBar) {
            timerBar.style.transition = 'none';
            timerBar.style.width = pctLeft + '%';
            timerBar.style.background = pctLeft > 30 ? '#7c3aed' : '#f97316';
            requestAnimationFrame(() => requestAnimationFrame(() => {
                const remaining = Math.max(0, timeLimit - elapsed);
                timerBar.style.transition = `width ${remaining}s linear, background 1s`;
                timerBar.style.width = '0%';
                timerBar.style.background = '#f43f5e';
            }));
        }
        const updateTimer = () => {
            const e = (Date.now() - startTime) / 1000;
            const left = Math.max(0, timeLimit - e);
            numEl.textContent = Math.ceil(left);
            const isUrgent = left <= 5;
            numEl.className = isUrgent ? 'text-3xl font-black tabular-nums w-14 text-center timer-urgent' : 'text-3xl font-black text-violet-400 tabular-nums w-14 text-center';
            if (left <= 0) clearInterval(qTimerInterval);
        };
        updateTimer();
        qTimerInterval = setInterval(updateTimer, 250);
    }

    // Refresh card animation
    const card = document.getElementById('q-card');
    card.classList.remove('fade-in'); void card.offsetWidth; card.classList.add('fade-in');
    showScreen('screen-question');
}

// Scores live dans la colonne droite — appelé à chaque update Firestore
function renderTeamsBar(teams) {
    const panel = document.getElementById('q-teams-live');
    if (!panel) return;
    const sorted = [...teams].sort((a,b) => (b.score||0) - (a.score||0));
    const maxScore = Math.max(...sorted.map(t => t.score||0), 1);
    const medals = ['🥇','🥈','🥉'];

    panel.innerHTML = sorted.map((t, i) => {
        const pct = Math.round((t.score||0) / maxScore * 100);
        const medal = medals[i] || `${i+1}`;
        return `
        <div class="group" style="animation:fadeIn .4s ${i*0.08}s ease both">
            <div class="flex items-center justify-between mb-1.5">
                <div class="flex items-center gap-2 min-w-0">
                    <span class="text-base flex-shrink-0">${medal}</span>
                    <div class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${t.color}"></div>
                    <span class="font-black text-white text-sm truncate">${t.name}</span>
                </div>
                <span class="score-val font-black text-sm flex-shrink-0 ml-2" style="color:${t.color}">${t.score||0}</span>
            </div>
            <div class="h-2.5 bg-slate-800 rounded-full overflow-hidden">
                <div class="score-bar-fill h-full rounded-full" style="--w:${pct}%;background:${t.color};animation-delay:${i*0.1}s"></div>
            </div>
        </div>`;
    }).join('');
}

function renderScores(teams) {
    const sorted = [...teams].sort((a,b) => (b.score||0) - (a.score||0));
    const maxScore = Math.max(...sorted.map(t => t.score||0), 1);
    const medals = ['🥇','🥈','🥉'];
    document.getElementById('sc-list').innerHTML = sorted.map((t,i) => {
        const pct = Math.round((t.score||0) / maxScore * 100);
        return `
        <div class="pop-in" style="animation-delay:${i*0.1}s">
            <div class="flex items-center gap-5 mb-2">
                <span class="text-5xl flex-shrink-0">${medals[i] || `<span class='text-slate-500 font-black text-2xl'>#${i+1}</span>`}</span>
                <div class="w-5 h-5 rounded-full flex-shrink-0" style="background:${t.color}"></div>
                <span class="font-black text-white text-2xl flex-grow">${t.name}</span>
                <span class="font-black text-4xl" style="color:${t.color}">${t.score||0}</span>
                <span class="text-slate-600 font-bold">pts</span>
            </div>
            <div class="ml-16 h-3 bg-slate-800 rounded-full overflow-hidden">
                <div class="score-bar-fill h-full rounded-full" style="--w:${pct}%;background:${t.color};animation-delay:${i*0.15+0.3}s"></div>
            </div>
        </div>`;
    }).join('');
}

function renderEnd(teams) {
    renderScores(teams);
    const sorted = [...teams].sort((a,b) => (b.score||0) - (a.score||0));
    document.getElementById('end-podium').innerHTML = sorted.slice(0,3).map((t,i) => `
        <div class="flex items-center gap-4 fade-in" style="animation-delay:${i*0.15}s">
            <span class="text-4xl">${['🥇','🥈','🥉'][i]}</span>
            <div class="w-5 h-5 rounded-full flex-shrink-0" style="background:${t.color}"></div>
            <span class="font-black text-white text-2xl">${t.name}</span>
            <span class="font-black ml-auto text-2xl" style="color:${t.color}">${t.score} pts</span>
        </div>`).join('');
}

// =====================================================================
// INIT — check URL param
// =====================================================================
window.onload = async () => {
    const params = new URLSearchParams(location.search);
    const code = params.get('code');
    if (code && /^\d{2}$/.test(code)) {
        document.getElementById('pres-code').value = code;
        await connect();
    }
};
</script>
</body>
</html>
